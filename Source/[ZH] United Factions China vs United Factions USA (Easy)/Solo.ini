FXList FX_ToppleTreeRedBig
  Sound
    Name = CrushTree
  End
  ParticleSystem
    Name   = RedTreeLeavesFalling
    Offset = X:0.0 Y:0.0 Z:15.0
  End
  ParticleSystem
    Name   = RedTreeLeavesFalling
    Offset = X:0.0 Y:0.0 Z:20.0
  End
  ParticleSystem
    Name   = RedTreeLeavesFalling
    Offset = X:0.0 Y:0.0 Z:35.0
  End
End

