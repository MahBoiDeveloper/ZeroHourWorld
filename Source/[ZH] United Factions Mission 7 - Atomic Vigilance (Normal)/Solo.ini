Locomotor WanderCarLocomotor
  Surfaces        = GROUND
  Speed           = 20
  SpeedDamaged    = 20
  TurnRate        = 120
  TurnRateDamaged = 120
  Acceleration    = 10
  AccelerationDamaged = 10
  Braking         = 50
  MinTurnSpeed    = 15
  TurnPivotOffset = -0.5
  ZAxisBehavior   = NO_Z_MOTIVE_FORCE
  Appearance      = FOUR_WHEELS

  CanMoveBackwards       = Yes
  AccelerationPitchLimit = 5
  DecelerationPitchLimit = 5
  BounceAmount           = 35
  PitchStiffness         = 0.5
  RollStiffness          = 0.5
  PitchDamping           = 0.5
  RollDamping            = 0.5
  ForwardAccelerationPitchFactor = 0.3
  LateralAccelerationRollFactor  = 0.2
End

