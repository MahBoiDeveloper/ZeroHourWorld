Object AmericaVehicleSentryDrone

RemoveModule ModuleTag_01
;RemoveModule ModuleTag_03
RemoveModule ModuleTag_04


 AddModule
  Draw = W3DTankDraw ModuleTagNewModel_01
    InitialRecoilSpeed   = 10
    MaxRecoilDistance    = 1.5
    RecoilSettleSpeed    = 3

    OkToChangeModelColor = Yes

    DefaultConditionState
      Model                           = AVSENTRY
      Animation                       = AVSENTRY.AVSENTRY
      AnimationMode                   = LOOP
      Turret                          = TURRET01
      HideSubObject                   = TURRETUP09  ;Hide controlled turret
      WeaponFireFXBone  = PRIMARY   TurretFX
      WeaponMuzzleFlash = PRIMARY   TurretFX
      WeaponRecoilBone  = PRIMARY   TurretUp
    End
    ConditionState                    = REALLYDAMAGED
      Turret                          = TURRET01
      Model                           = AVSENTRY_D
      Animation                       = AVSENTRY_D.AVSENTRY_D
      AnimationMode                   = LOOP
      HideSubObject                   = TURRETUP09      ;Hide controlled turret
    End
    ConditionState                    = RUBBLE
      Model                           = AVSENTRY_D1
      HideSubObject                   = TURRETUP09      ;Hide controlled turret
    End
    AliasConditionState = RUBBLE WEAPONSET_PLAYER_UPGRADE 
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE
      Model                           = AVSENTRY
      Animation                       = AVSENTRY.AVSENTRY
      AnimationMode                   = LOOP
      ShowSubObject                   = TURRETUP09
    End

    ConditionState = WEAPONSET_PLAYER_UPGRADE REALLYDAMAGED
      Model                           = AVSENTRY_D
      Animation                       = AVSENTRY_D.AVSENTRY_D
      AnimationMode                   = LOOP
      ShowSubObject                   = TURRETUP09
    End

    TrackMarks           = EXTnkTrack.tga
    TreadDebrisLeft      = SentryDroneTrackDebrisDirtLeft
    TreadDebrisRight     = SentryDroneTrackDebrisDirtRight
    TreadAnimationRate   = 4.0  ; amount of tread texture to move per second
  End

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY None
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE 
    Weapon     = PRIMARY Lazr_SentryDroneImprovedWeapon2
  End

  Behavior = AIUpdateInterface ModuleTagNew_02
    Turret
      TurretTurnRate        = 180
      MinIdleScanInterval   = 250
      MaxIdleScanInterval   = 250
      MinIdleScanAngle      = 0
      MaxIdleScanAngle      = 360
      ControlledWeaponSlots = PRIMARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL SentryLocomotor
 End
End

