Object Lazr_PaladinLaserBeam
 RemoveModule ModuleTag_01
 RemoveModule ModuleTag_02
 AddModule
  Draw = W3DLaserDraw ModuleTag_01_Override
    Texture = exlnzflar3.tga ;EXLaser4.tga
    NumBeams = 8                              ;Number of overlapping cylinders that make the beam. 1 beam will just use inner data.
    InnerBeamWidth = 1                    ;The total width of beam
    InnerColor = R:90 G:54 B:255 A:255          ;The inside color of the laser (hot)
    OuterBeamWidth = 8                       ;The total width of beam
    OuterColor = R:90 G:54 B:255 A:255            ;The outside color of the laser (cool)
    Tile = No                                ;The height of the texture will determine how many times to tile the texture to fit without scaling.
    ScrollRate = -500                        ;Scrolls the texture offset this fast -- towards(-) away(+)
    Segments = 1                              ;Number of segments -- more segments give smoother curve (but more joints) Current max: 20
    SegmentOverlapRatio = 0                   ;This value overlaps(+) or separates(-) the segments by ratio
    TilingScalar = -3                         ;Stretches tiling if value > 1.0, otherwise shrinks it (1.0 is natural)
  End
  ClientUpdate = LaserUpdate ModuleTag_02_Override
    MuzzleParticleSystem = VeryCool_PaladinPointDefenseLaserFlare
    TargetParticleSystem = VeryCool_GenericRedLaserFlare
  End
 End
End

