Object ChinaVehicleInfernoCannon
  AddModule
Draw = W3DOverlordTankDraw ModuleTag_Sui
    ConditionState        = NONE
      Model               = NVOvrlrd
      Animation           = NVOvrlrd.NVOvrlrd
      AnimationMode       = LOOP
      Turret              = Turret01
      WeaponFireFXBone    = PRIMARY Muzzle
      WeaponRecoilBone    = PRIMARY Barrel
      WeaponMuzzleFlash   = PRIMARY MuzzleFX
      WeaponLaunchBone = PRIMARY Muzzle
      HideSubObject       = BARREL01 BAREEL02 HOUSECOLOR01 HOUSECOLOR2 HOUSECOLOR03 HOUSECOLOR04 TURRET01
      ShowSubObject       = BombWing
    End
  End
End

  WeaponSet
   Conditions = None 
   Weapon = PRIMARY NukeCannonGun
   ShareWeaponReloadTime = Yes
  End
End

Object ChinaVehicleHelix
  AddModule
   Draw =  W3DOverlordAircraftDraw  ModuleTag_n0ttws01; Works with the dependencyModelDraw of the upgrade portable structures 
    ParticlesAttachedToAnimatedBones = Yes

    DefaultConditionState
     Model = NVHELIX
     Animation = NVHELIX.NVHELIX
     AnimationMode = LOOP
     WeaponFireFXBone    = PRIMARY Muzzle03
     WeaponMuzzleFlash   = PRIMARY TurretFX03
     HideSubObject       = CHASSIS
     ShowSubObject       = BombWing
    End
   End
  End

  AddModule
   Draw = W3DModelDraw ModuleTag_n0ttws02
    DefaultConditionState
     Model           = NVCargoPln_D1
    End
   End
  End

  WeaponSet
   Conditions          = PLAYER_UPGRADE 
   ;----------------------------
   Weapon              = PRIMARY     BuggyRocketWeaponUpgraded
   Weapon              = SECONDARY   GattlingTankGunAir
  End
End

