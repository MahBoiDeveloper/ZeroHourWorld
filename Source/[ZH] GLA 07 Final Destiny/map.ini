Object AmericaCommandCenter
  AddModule 
  Behavior = StealthUpdate ModuleTag_NolanStealth
    StealthDelay                = 2000 ; msec
    StealthForbiddenConditions  = ATTACKING USING_ABILITY TAKING_DAMAGE
