;.......................America Battleship Hulk and Hulk OCL Part...............
Object AmericaBattleShipDeadHulkTypeI
 AddModule
  Draw = W3DModelDraw ModuleTag_ForwardBone
    ExtraPublicBone = TREADFX01 TREADFX02
    ExtraPublicBone = HEADLIGHT01 BOMBBIKE HANDLEBAR TIRE01 TIRE00 SHOCK 
    DefaultConditionState
      Model = UVComBike
      HideSubObject = CHASIS HOUSECOLOR03 HEADLIGHT01 BOMBBIKE HANDLEBAR TIRE01 TIRE00 SHOCK HOUSECOLOR02 EXPLOSION SUICIDEBOMB3 SMOKE
    End
  End
  Draw = W3DModelDraw ModuleTag_AuxTurretA
    ExtraPublicBone = TUR1BARREL01 TUR1BARREL02 TUR1BARREL03 TUR2BARREL01 TUR2BARREL02 TUR2BARREL03 LIGHT01BASE LIGHT02BASE LIGHT01 LIGHT02 RADAR01 RADAR02 RADAR03
    DefaultConditionState
      Model = avbattlesh_D1
      Turret = Turret01
      TurretArtAngle = 315
      AltTurret = Turret02
      AltTurretArtAngle = 45
      HideSubObject = TUR1BARREL01 TUR2BARREL01 TUR2BARREL02
      ParticleSysBone = NONE BattleShipBowBreakSplash1
      ParticleSysBone = NONE BattleShipBowBreakSplash2
      ParticleSysBone = NONE BattleShipBowBreakSplash3
      ParticleSysBone = NONE BattleShipBowBreakSplash4
      ParticleSysBone = NONE BattleShipBowBreakSplash5
      ParticleSysBone = OILSLICKBONE airCarrierOilSlick
      ParticleSysBone = OILSLICKBONE airCarrierMidShipSplash
      ParticleSysBone = SPARK1BONE airCarrierSmoke
      ParticleSysBone = SPARK1BONE airCarrierDeckFire
      ParticleSysBone = SPARK2BONE airCarrierSmoke
      ParticleSysBone = SPARK2BONE airCarrierDeckFire
      ParticleSysBone = Turret01 airCarrierSmoke
      ParticleSysBone = Turret01 airCarrierDeckFire
      ParticleSysBone = Turret02 airCarrierSmoke
      ParticleSysBone = Turret02 airCarrierDeckFire 
      ParticleSysBone = BOWSPLASH0BONE1 airCarrierBowDeathSplash
    End
  End
  Draw = W3DModelDraw ModuleTag_AuxTurretB
    AttachToBoneInAnotherModule = LIGHT01BASE
    OkToChangeModelColor  = Yes
    DefaultConditionState 
      Model = NBGattling_E
      Animation = NBGattling_A2.NBGattling_A2
      AnimationMode = MANUAL
      Turret = TURRET
      TurretArtAngle = 45
      TurretPitch = TURRETEL
      TurretArtPitch = -35
      WeaponFireFXBone = TERTIARY Muzzle
      WeaponMuzzleFlash = TERTIARY MuzzleFX
      HideSubObject = BASE HOUSECOLOR04
      ShowSubObject = TURRET
      ParticleSysBone = TURRET airCarrierSmoke
      ParticleSysBone = TURRET airCarrierDeckFire 
    End
  End
  Draw = W3DModelDraw ModuleTag_AuxTurretBasement
    AttachToBoneInAnotherModule = LIGHT01BASE
    DefaultConditionState
      Model = ABPatriot_E
      Turret = TURRET01
      TurretPitch = TURRETEL
      HideSubObject = TURRET01
    End
    OkToChangeModelColor  = Yes
  End
  
  Body = ActiveBody ModuleTagNew_01
    MaxHealth = 1
    InitialHealth = 1
  End
  Behavior = LifetimeUpdate ModuleTag_04_Override
    MinLifetime = 22000  ; min lifetime in msec
    MaxLifetime = 25000   ; max lifetime in msec
  End
  Behavior = FireWeaponWhenDeadBehavior  ModuleTag_ChangeDeathWeaponA
    DeathWeapon = Demo_BombTruckHighExplosiveBombEffect
    StartsActive = Yes
  End
  Behavior = FireWeaponWhenDeadBehavior  ModuleTag_ChangeDeathWeaponB
    DeathWeapon = BlackNapalmBombWeapon
    StartsActive = Yes
  End
  Behavior = SlowDeathBehavior ModuleTag_SlowDeath
    SinkDelay         = 12000
    SinkRate          = 2     ; in Dist/Sec
    DestructionDelay  = 25000
    FX = INITIAL Demo_WeaponFX_BombTruckHighExplosiveBombDetonation
    Weapon = MIDPOINT BlackNapalmBombWeapon
    FX = FINAL WeaponFX_MOAB_Blast
  End
  Behavior = FloatUpdate UpdateTag_FloatUpdate
    Enabled = Yes ; 'no' because we dont want to be lifted by this update, just swayed around like a buoy
  End
 End
  
  Scale = 0.95
  KindOf = CAN_CAST_REFLECTIONS NO_COLLIDE HULK UNATTACKABLE PRELOAD
  Geometry = BOX
  GeometryMajorRadius = 9
  GeometryMinorRadius = 6
  GeometryHeight = 7.5     
  GeometryIsSmall = Yes  

  RemoveModule ModuleTag_DefaultDestroyDie  
  RemoveModule ModuleTag_DefaultInactiveBody  
  RemoveModule ModuleTag_DefaultW3DDefaultDraw
End

