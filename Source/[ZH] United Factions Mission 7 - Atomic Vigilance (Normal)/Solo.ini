Object CINE_ChinaTankBattleMaster
RemoveModule ModuleTag_01
RemoveModule ModuleTag_03
 AddModule

  Draw = W3DTankDraw SpecificTag_1
    OkToChangeModelColor = Yes
    ExtraPublicBone 	 = TURRET01
    DefaultConditionState
      Model             = NVBtMstr
      Turret            = Turret01
      WeaponFireFXBone  = PRIMARY Muzzle
      WeaponRecoilBone  = PRIMARY Barrel
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponLaunchBone  = PRIMARY Muzzle
      WeaponFireFXBone  = SECONDARY Smoke04
    End
    ConditionState      = REALLYDAMAGED
      Model             = NVBtMstr_D
      Turret            = Turret01
      WeaponFireFXBone  = PRIMARY Muzzle
      WeaponRecoilBone  = PRIMARY Barrel
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponLaunchBone  = PRIMARY Muzzle
      ParticleSysBone   = Smoke01 SmallLightSmokeColumn
      ParticleSysBone   = Smoke03 FireFactionSmall
    End
    ConditionState      = RUBBLE
      Model             = NVBtMstr_D
      Turret            = Turret01
      ParticleSysBone   = Smoke01 SmallLightSmokeColumn
      ParticleSysBone   = Smoke03 FireFactionSmall
    End
    ConditionState      = USER_1
      Model             = NVBtMstrNG
      Turret            = Turret01
      WeaponFireFXBone  = PRIMARY Muzzle
      WeaponRecoilBone  = PRIMARY Barrel
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponLaunchBone  = PRIMARY Muzzle
    End
    ConditionState      = USER_1 REALLYDAMAGED
      Model             = NVBtMstrNG_D
      Turret            = Turret01
      WeaponFireFXBone  = PRIMARY Muzzle
      WeaponRecoilBone  = PRIMARY Barrel
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponLaunchBone  = PRIMARY Muzzle
      ParticleSysBone   = Smoke01 SmallLightSmokeColumn
      ParticleSysBone   = Smoke03 FireFactionSmall
    End
    ConditionState      = USER_1 RUBBLE
      Model             = NVBtMstrNG_D
      Turret            = Turret01
      ParticleSysBone   = Smoke01 SmallLightSmokeColumn
      ParticleSysBone   = Smoke03 FireFactionSmall
    End
    TrackMarks = EXTnkTrack.tga
  End

  WeaponSet
    Conditions = None 
    Weapon     = PRIMARY BattleMasterTankGun
    Weapon     = SECONDARY BattlemasterMachineGunWeapon
  End

  Behavior = AIUpdateInterface SpecificTag_2
    Turret
      TurretTurnRate = 120
      ControlledWeaponSlots = PRIMARY SECONDARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate        = 10
  End
 End

 Locomotor              = SET_NORMAL CrusaderLocomotor
End

Object ConvoyTruckArmedWithNuke
RemoveModule ModuleTag_02
 AddModule
  ArmorSet
    Conditions = None
    Armor      = ToxinTruckArmor 
    DamageFX   = TruckDamageFX
  End
  Body = ActiveBody SpecificTag_1
    MaxHealth        = 500
    InitialHealth    = 500
    SubdualDamageCap = 650
    SubdualDamageHealRate   = 500
    SubdualDamageHealAmount = 50
  End
 End

 CommandSet = GenericCommandSet
 Locomotor  = SET_NORMAL WanderCarLocomotor
 Locomotor  = SET_WANDER WanderCarLocomotor
 Locomotor  = SET_PANIC  WanderCarLocomotor
End

Object ConvoyTruck04
RemoveModule ModuleTag_01
 AddModule
  Draw              = W3DTruckDraw SpecificTag_1
    OkToChangeModelColor = Yes
    ConditionState  = NONE
      Model         = NVConvoy
    End
    ConditionState  = LOADED
      Model         = NVConvoy
    End  
    CabRotationMultiplier = 1.5

    TrailerRotationMultiplier = 0.2
    ;CabBone = CAB
    ;TrailerBone = TRAILER
    RotationDamping = 0.7

    RightFrontTireBone = Tire01
    LeftFrontTireBone = Tire02
    ;MidRightFrontTireBone = Tire03
    ;MidLeftFrontTireBone = Tire04
    ;MidRightMidTireBone = Tire05
    ;MidLeftMidTireBone = Tire06
    MidRightRearTireBone = Tire07
    MidLeftRearTireBone = Tire08
    RightRearTireBone = Tire09
    LeftRearTireBone = Tire10

    TireRotationMultiplier = 0.2
    
    TrackMarks = EXTireTrack.tga
    Dust = RocketBuggyDust
    DirtSpray = RocketBuggyDirtSpray
  End
 End

 Locomotor              = SET_NORMAL CrusaderLocomotor
End

