;========================================================================================
;Map.ini For United Factions Gamemode
;United Factions Gamemode improve all vanila Factions massively from new units, weapons,
;structures and effects. this Gamemode is mainly for my personal satisfaction (Just Like
;How I Buff The Crusader Massively Because I Love Crusader) but i do take into account
;the balance of every faction in this Gamemode.
;
;
;Side note, Most of the custom buildings does not have snow models because some of the
;combined models does not have snow model than the others making the building half snow
;and half normal if enabled, and so i disabled it all togeher
;
;
;Right now the code is heavily coded and used most of the game upgrades and command sets
;unfortunately this gamemode can only be played only in UF coded, using it beside other
;faction except USA, China and GLA will cause issues
;
;Lastly i want to say massive Thankyou to..
;Newgate, who provide help and code examples for me to use and learn on, Sasuga master :P
;BKR, who also provide help when i first started and who also manage to make the original
;     ICBM silo to work properly
;Cresty, who provide some of his improved effects which makes the game looks visually
;        pleasing
;NeoMaurice, who provide the insane particle cannon effects
;Sugar and Veloxius, As the most active tester and provide the most detailed feedback for me
;
;Thankyou all the WBC Community who have helped me and i might not mention you!
;
;Hope you enjoy this mini MOD of mine
;
;
;Creator : Gramantio
;Youtube : Gramantio    Check it out! :P
;Discord : Gramantio#6921
