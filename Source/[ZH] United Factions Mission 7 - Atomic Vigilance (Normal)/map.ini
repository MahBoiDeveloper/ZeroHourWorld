Object HALOInfantryGrazia

  SelectPortrait         = SNSprLotus_L
  ButtonImage            = SNSprLotus
  
  UpgradeCameo1 = Upgrade_AmericaAdvancedTraining

 AddModule
  ;The body! The booddddyyyyyyyy....
  Draw = W3DModelDraw ModuleTagNewModel_01
    ExtraPublicBone = NIHERO_SKIN
    OkToChangeModelColor = Yes
    
    ; --- idle
    DefaultConditionState
      Model         = NIHERO_SKN
      HideSubObject = CASE CASELID SATCOM
      IdleAnimation = AITECH_SKL.AITECH_IDA
      AnimationMode = ONCE
      TransitionKey = TRANS_Stand
    End
    AliasConditionState = REALLYDAMAGED

    ; --- moving
    ConditionState  = MOVING
      Animation     = AITECH_SKL.AITECH_WKA 15
      AnimationMode = LOOP
      TransitionKey = None
      ParticleSysBone = None InfantryDustTrails
    End
    AliasConditionState = MOVING REALLYDAMAGED

   ;----- Attacking Primary
    TransitionState = TRANS_Stand TRANS_FIRING_A
      Animation     = AITECH_SKL.AITECH_STA
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 4 4
    End

    ConditionState  = FIRING_A
      Animation     = AITECH_SKL.AITECH_STA
      AnimationMode = MANUAL
      TransitionKey = TRANS_FIRING_A
    End

    TransitionState = TRANS_FIRING_A TRANS_Stand
