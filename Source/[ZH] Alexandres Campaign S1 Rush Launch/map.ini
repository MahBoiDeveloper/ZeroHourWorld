    End
WeaponSet
    Conditions = None 
    Weapon = PRIMARY HumveeGun
    Weapon = SECONDARY HumveeMissileWeaponAirDummy
    Weapon = TERTIARY  CrusaderTankGun

                    
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE 
    Weapon = PRIMARY HumveeGun
    Weapon = SECONDARY HumveeMissileWeapon
    Weapon = TERTIARY  CrusaderTankGun
      End
   End
End

