    OCL            = INITIAL OCL_ParticleCannonDetonationInitial
    FX             = FINAL   FX_ParticleCannonDetonationFinal
    OCL            = FINAL   OCL_ParticleUplinkDetonationFinal
    Weapon         = FINAL   ParticleCannonDetonationWeapon
  End
 End
