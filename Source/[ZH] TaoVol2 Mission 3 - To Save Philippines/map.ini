    End
    
    ConditionState = RUBBLE
      Model = None
    End
  End
  Behavior = SlowDeathBehavior ModuleTag_Aux11
    DeathTypes = ALL +CRUSHED +SPLATTED
    SinkDelay = 8000
    SinkRate = 2     ; in Dist/Sec
    DestructionDelay = 14000
    FX  = INITIAL FX_DragonTankDeathExplosionFinal 
    FX  = FINAL FX_BattleMasterExplosionOneFinal
    OCL = FINAL OCL_BigPlaneDeath
  End
  Body = ActiveBody ModuleTag_AuxHealthA
    MaxHealth = 450.0
    InitialHealth = 450.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 720
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  Behavior = AutoHealBehavior ModuleTag_DefaultAutoHealBehaviorAmericanLightAttackerE ; note that this inherited AutoHeal must only deal with veterancy, because that controls if you get it (because of the tag name)
    HealingAmount = 10  ;in health points
    HealingDelay = 1000 ; msec
    TriggeredBy = Upgrade_Veterancy_ELITE Upgrade_Veterancy_HEROIC ; Either of these two will work (you can skip Elite, so need both)
    StartHealingDelay = 5000 ;in miliseconds
  End
  Behavior = AIUpdateInterface ModuleTag_AuxTurretAIUpdate
