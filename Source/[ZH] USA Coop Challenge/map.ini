Object Lazr_AmericaTankPaladin

  Prerequisites
    Object = AmericaWarFactory Lazr_AmericaWarFactory
  End

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY OAS
  End


  RemoveModule ModuleTag_08
  RemoveModule ModuleTag_09
  RemoveModule ModuleTag_19

  AddModule
   Behavior                = ArmorUpgrade ModuleTag_Armor01
    TriggeredBy           = Upgrade_AmericaCompositeArmor
  End
  Behavior = ObjectCreationUpgrade ModuleTag_08_Override
    UpgradeObject = Lazr_OCL_AmericanBattleDrone
    TriggeredBy   = Upgrade_AmericaBattleDrone
    ConflictsWith = Upgrade_AmericaScoutDrone Upgrade_AmericaHellfireDrone
    FXListUpgrade = FX_PaladinDrone
  End
  Behavior = ObjectCreationUpgrade ModuleTag_09_Override
    UpgradeObject = OCL_AmericanScoutDrone
    TriggeredBy   = Upgrade_AmericaScoutDrone
    ConflictsWith = Upgrade_AmericaBattleDrone Upgrade_AmericaHellfireDrone
    FXListUpgrade = FX_PaladinDrone
  End 
  Behavior = ObjectCreationUpgrade ModuleTag_19_Override
    UpgradeObject = OCL_AmericanHellfireDrone
    TriggeredBy   = Upgrade_AmericaHellfireDrone
    ConflictsWith = Upgrade_AmericaBattleDrone Upgrade_AmericaScoutDrone
    FXListUpgrade = FX_PaladinDrone
  End
  End
  ; *** AUDIO Parameters ***
  VoiceSelect = LaserPaladinTankVoiceSelect
  VoiceMove = LaserPaladinTankVoiceMove
  VoiceAttack = LaserPaladinTankVoiceAttack
  VoiceGuard = LazerHumveeVoiceMove
  
  UnitSpecificSounds
    VoiceCreate = LaserPaladinTankVoiceCreate
    VoiceCrush = LaserPaladinTankVoiceCrush
  End
  
 End























