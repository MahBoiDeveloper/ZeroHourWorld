;====================
;=China Boss Objects=
;====================

;===============================================================================================
; Overlords are back in Leang's Arsenal. She can now build both overlords and
; Emperors
; Note: This Object is a custom object, if you want to place this or use for AI build teams
; you must place the custom object ini file in the Generals folder otherwise, custom objects
; will either be replaced or removed from the map data in world builder and in game.
; For more information check the object ini file
;
; ...\Command & Conquer Generals Zero Hour\Data\INI\Object
;
; Custom objects are created by Gramantio in his UF Campaign:
; This is the HALO Emperor that Gram made but I changed its name and replace the standard, 
; american and gla upgrades to subfaction upgrades
;===============================================================================================

Object ChinaBoss_ChinaTankEmperor

  SelectPortrait = SNEmpTank_L
  ButtonImage    = SNEmpTank
  
  UpgradeCameo1 = Nuke_Upgrade_ChinaWGUraniumShells
  UpgradeCameo2 = Nuke_Upgrade_ChinaFusionReactors
  UpgradeCameo3 = Upgrade_ChinaIsotopeStability
  UpgradeCameo4 = Upgrade_ChinaChainGuns
  UpgradeCameo5 = Upgrade_ChinaSubliminalMessaging

  
 AddModule
  Draw = W3DOverlordTankDraw ModuleTagNewModel_01
    OkToChangeModelColor  = Yes
    ConditionState        = NONE
      Model               = NVOvrlrdT
      Animation           = NVOvrlrdT.NVOvrlrdT
      AnimationMode       = LOOP
      Turret              = Turret01
      WeaponFireFXBone    = PRIMARY Muzzle
      WeaponRecoilBone    = PRIMARY Barrel
      WeaponMuzzleFlash   = PRIMARY MuzzleFX
      WeaponLaunchBone    = PRIMARY Muzzle
    End

    ConditionState        = REALLYDAMAGED
      Model               = NVOvrlrdT_D
      Animation           = NVOvrlrdT_D.NVOvrlrdT_D
      AnimationMode       = LOOP
      HideSubObject       = SMOKE06 SMOKE07 SMOKE08
      Turret              = Turret01
      WeaponFireFXBone    = PRIMARY Muzzle
      WeaponRecoilBone    = PRIMARY Barrel
      WeaponMuzzleFlash   = PRIMARY MuzzleFX
      WeaponLaunchBone    = PRIMARY Muzzle
    End

    ConditionState        = RUBBLE
      Model               = NVOvrlrdT_D
      Animation           = NVOvrlrdT_D.NVOvrlrdT_D
      AnimationMode       = LOOP
      HideSubObject       = SMOKE06 SMOKE07 SMOKE08
      Turret              = Turret01
      WeaponFireFXBone    = PRIMARY Muzzle
      WeaponRecoilBone    = PRIMARY Barrel
      WeaponMuzzleFlash   = PRIMARY MuzzleFX
      WeaponLaunchBone    = PRIMARY Muzzle
    End
    TrackMarks              = EXTnkTrack.tga
    TreadAnimationRate      = 2.0
    TreadDriveSpeedFraction = 0.3
    TreadPivotSpeedFraction = 0.6
  End

  WeaponSet
    Conditions = None 
    Weapon     = PRIMARY Tank_OverlordTankGun
  End

  WeaponSet
    Conditions = PLAYER_UPGRADE
    Weapon     = PRIMARY Tank_OverlordTankGun
    Weapon     = SECONDARY GattlingBuildingGunAirDummy
  End

  ArmorSet
    Conditions = None
    Armor      = TankArmor
    DamageFX   = TankDamageFX
  End

  Prerequisites
    Object = ChinaWarFactory
    Object = ChinaPropagandaCenter
  End

  UnitSpecificSounds
    VoiceCreate     = OverlordTankVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop  = OverlordTankTurretMoveLoop
    VoiceCrush      = OverlordTankVoiceCrush
    VoiceEnter      = EmperorTankVoiceMove
  End

  Body = ActiveBody ModuleTagNew_01
    MaxHealth        = 1100.0
    InitialHealth    = 1100.0
    SubdualDamageCap = 2200
    SubdualDamageHealRate   = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = TransportAIUpdate ModuleTagNew_02
    Turret
      TurretTurnRate = 60
      ControlledWeaponSlots = PRIMARY SECONDARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End

  Behavior = OverlordContain ModuleTagNew_03
    Slots                   = 1
    DamagePercentToUnits    = 100%
    AllowInsideKindOf       = PORTABLE_STRUCTURE
    PassengersAllowedToFire = Yes
    PassengersInTurret      = Yes
    ExperienceSinkForRider  = Yes
  End

  Behavior = ObjectCreationUpgrade ModuleTagNew_04
    UpgradeObject = OCL_OverlordGattlingCannon
    TriggeredBy   = Upgrade_ChinaOverlordGattlingCannon
  End

  Behavior = WeaponSetUpgrade ModuleTagNew_05
    TriggeredBy = Upgrade_ChinaOverlordGattlingCannon
  End

  Behavior = ProductionUpdate ModuleTagNew_06
     MaxQueueEntries = 1
  End

  Behavior = CommandSetUpgrade ModuleTagNew_07
    CommandSet  = Tank_ChinaTankOverlordGattlingCannonCommandSet
    TriggeredBy = Upgrade_ChinaOverlordGattlingCannon
  End

  Behavior = PhysicsBehavior ModuleTagNew_08
    Mass            = 100.0
    ShockMaxRoll    = 0.001
    ShockMaxPitch   = 0.001
    ShockMaxYaw     = 0.001
    ShockResistance = 1.0
  End

  ; Just explode death
  Behavior = SlowDeathBehavior ModuleTagNew_11
    ProbabilityModifier = 25
    DestructionDelay = 200
    DestructionDelayVariance = 100
    OCL = FINAL    OCL_ChinaTankEmperorDebris
    FX  = FINAL    FX_OverlordExplosionOneFinal
  End

  
  Behavior = VeterancyGainCreate ModuleTagNew_12
    StartingLevel = VETERAN
