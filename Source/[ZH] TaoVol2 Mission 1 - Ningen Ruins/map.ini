Object VeryCool_Lazr_ParticleUplinkCannon_MediumConnectorLaser
  AddModule
  ; *** ART Parameters ***
  Draw = W3DLaserDraw ModuleTag_01
    Texture = exlnzflar1.tga
    NumBeams = 15                    ;Number of overlapping cylinders that make the beam. 1 beam will just use inner data.

    Tile = Yes                        ;The height of the texture will determine how many times to tile the texture to fit without scaling.
    ScrollRate = -1.75                ;Scrolls the texture offset this fast -- towards(-) away(+)
    TilingScalar = 0.90               ;Stretches tiling if value > 1.0, otherwise shrinks it (1.0 is natural)

