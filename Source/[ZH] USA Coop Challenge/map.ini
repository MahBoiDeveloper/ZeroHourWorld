Object Lazr_AmericaVehicleHumvee

  VisionRange     = 300
  RemoveModule ModuleTag_01
  RemoveModule ModuleTag_05
 AddModule
  Draw = W3DTruckDraw ModuleTag_01_Override
    OkToChangeModelColor = Yes
    ConditionState = NONE
      Model = AVHUMMER
      Turret = Turret
      ShowSubObject = Turret
      HideSubObject = TurretUp01 Housecolor03 MuzzleFXUP01
      WeaponFireFXBone = PRIMARY Muzzle
      WeaponMuzzleFlash = PRIMARY MuzzleFX
    End
    ConditionState = REALLYDAMAGED
      Model = AVHUMMER_d
      Turret = Turret
      ShowSubObject = Turret
      HideSubObject = TurretUp01 Housecolor03 MuzzleFXUP01
      WeaponFireFXBone = PRIMARY Muzzle
      WeaponMuzzleFlash = PRIMARY MuzzleFX
    End
    ConditionState = WEAPONSET_PLAYER_UPGRADE
      Model = AVHUMMER
      Turret = TurretUp01
      HideSubObject = Turret MuzzleFX01
      ShowSubObject = TurretUp01 Housecolor03
      WeaponFireFXBone = PRIMARY MuzzleUp
      WeaponMuzzleFlash = PRIMARY MuzzleFXUp
      WeaponFireFXBone = SECONDARY WeaponB01
      WeaponFireFXBone = TERTIARY WeaponB01
    End
    ConditionState = REALLYDAMAGED WEAPONSET_PLAYER_UPGRADE
      Model = AVHUMMER_d
      Turret = TurretUp01
      HideSubObject = Turret MuzzleFX01
      ShowSubObject = TurretUp01 Housecolor03
      WeaponFireFXBone = PRIMARY MuzzleUp
      WeaponMuzzleFlash = PRIMARY MuzzleFXUp
      WeaponFireFXBone = SECONDARY WeaponB01
      WeaponFireFXBone = TERTIARY WeaponB01
    End
    TrackMarks = EXTireTrack.tga
    Dust = RocketBuggyDust
    DirtSpray = RocketBuggyDirtSpray
    PowerslideSpray = RocketBuggyDirtPowerSlide
    LeftFrontTireBone = Tire01
    RightFrontTireBone = Tire02
    LeftRearTireBone = Tire03
    RightRearTireBone = Tire04
    TireRotationMultiplier = 0.2
    PowerslideRotationAddition = 1.25
  End


  Behavior = TransportContain  ModuleTag_05_Override
    PassengersAllowedToFire = Yes
    Slots             = 5
;    EnterSound          = GarrisonEnter
;    ExitSound           = GarrisonExit
    DamagePercentToUnits = 100% ;100%
    AllowInsideKindOf  = INFANTRY
    ExitDelay = 250
    NumberOfExitPaths = 3 ; Defaults to 1.  Set 0 to not use ExitStart/ExitEnd, set higher than 1 to use ExitStart01-nn/ExitEnd01-nn
    GoAggressiveOnExit = Yes ; AI Will tell people to set their mood to Aggressive on exiting
  End
 End

  WeaponSet
    Conditions = None
    Weapon = PRIMARY Lazr_HumveeGun 
    Weapon = SECONDARY HumveeMissileLazerAirDummy
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE 
    Weapon = PRIMARY Lazr_HumveeGun 
    Weapon = SECONDARY HumveeLaserMissileWeapon
    Weapon = TERTIARY HumveeLaserMissileWeaponAir
    PreferredAgainst = TERTIARY     AIRCRAFT
  End

  ; *** AUDIO Parameters ***
  VoiceSelect = LazerHumveeVoiceSelect
  VoiceMove = LazerHumveeVoiceMove
  VoiceAttack = LazerHumveeVoiceAttack
  VoiceGuard = LazerHumveeVoiceMove
  SoundStealthOn = StealthOn
  SoundStealthOff = StealthOff
  
  UnitSpecificSounds
    VoiceCreate = LazerHumveeVoiceCreate
  End
End

Object Lazr_AmericaInfantryRanger

  WeaponSet
