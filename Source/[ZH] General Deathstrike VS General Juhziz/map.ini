


;--------------------------------------------------- 
;-- I decide to use all my gen tactics in 1 file----
;---------------------------------------------------
; There are 4 section for each ini and objects has been modified
; 1. ChinaBoss
; 2. GLABoss
; 3. USABoss
; 4. Specific - used for different maps
;
; I created this one for a few months ago but there is an error that you
; can't load on a saved game that has this ini file but i 
; finally figured it out why, beacuase the Module tags has the same name base
; on an object and I finally fixed it
;
; This is my map.ini file for the Boss Generals that I created. I've restored most of the
; cut content and/or unused stuff within the game. I only changed all of the Vanilla factions
; into a Boss General for each faction.
;
; USA Vanilla   to USA Boss
; China Vanilla to China Boss
; GLA Vanilla   to GLA Boss
;
; These Boss Generals have the combination of the Sub Faction - Arsenal in their Perspective 
; faction.
;
; For Example:
; General Ironside has the combination of the Airforce, Superweapons and Laser Generals.
; I revert General Leang's Arsenal into her True Arsenal, having the combination of
; the 3 Chinese Generals, which it makes more sense rather than the Combined factions Arsenal.
;
; Note/Warning:
; Some user have issues where if you save and load the game the Boss(es) changed into
; a vanilla which I have no idea how that happend (might be because of my code or depending on their
; laptop/desktop). But for now, the reason how this issue occured remains unknown. I will try to fix
; it in no time or in the future.
;
; Special Thanks to:
; Newgate
; BKR
; Gramantio
; 
;== weather rain or snow and water ===
;
; Ini and objects in-order
; 
; 1.  Rank/Weather/Locomotor
; 2.  Audio/Voices
; 3   Partciles
; 4   FX Lists
; 4.1 Damage FX
; 5   Armor
; 6   Science
; 7   Upgrades
; 8   Special Powers 
; 9   Weapons
; 9.1 OCLs used by New Objects 
; 10  New Objects 
; 11  OCLs
; 12  Objects
; 13  Command Buttons
; 14  Command Sets
; 15  Mapped Images
; 16  Player Template
;-----------------------------------------------------------------------

Object CINE_AmericaTankCrusader
  Locomotor            = SET_NORMAL CINE_CrusaderLocomotor
End

Object CINE_GLATankScorpion
  Locomotor            = SET_NORMAL CINE_CrusaderLocomotor
End

Object CINE_ChinaTankBattleMaster
  RemoveModule ModuleTag_07
  Locomotor            = SET_NORMAL CINE_CrusaderLocomotor
End

Object WaterStorageTank01
  RemoveModule ModuleTag_02
  AddModule
  Body            = ActiveBody ModuleTagNew_01
    MaxHealth       = 1500.0
    InitialHealth   = 1500.0
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTagNew_02
    DeathWeapon   = Demo_BombTruckHighExplosionBombDamage
    StartsActive  = Yes                      ; turned on by upgrade
    ;TriggeredBy   = Upgrade_GLABombTruckHighExplosiveBomb
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTagNew_03
    DeathWeapon   = Demo_BombTruckHighExplosionBombDamage
    StartsActive  = Yes                      ; turned on by upgrade
    ;TriggeredBy   = Upgrade_GLABombTruckHighExplosiveBomb
  End
 End
End

