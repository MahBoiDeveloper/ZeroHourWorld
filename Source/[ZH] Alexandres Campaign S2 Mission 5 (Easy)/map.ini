  PrimaryDamage       = 150.0
  PrimaryDamageRadius = 250.0
  AttackRange         = 250
  ShockWaveAmount     = 40.0s
  ShockWaveRadius     = 100.0
  ShockWaveTaperOff   = 0.33
  DamageType          = SNIPER
  DeathType           = EXPLODED
  FireFX              = WeaponFX_NeutronBlastShakingEffect
  DelayBetweenShots   = 100
  ClipSize            = 0
End

